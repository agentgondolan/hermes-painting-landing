name: Deploy static export to Cloudflare Pages
run-name: Deploy static export to Cloudflare Pages @ ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MGEVERYDAY_API_TOKEN: ${{ secrets.MGEVERYDAY_API_TOKEN }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      PROJECT_NAME: hermes-painting-landing
      BUILD_DIR: .next/prod
      NEXT_PUBLIC_MGE_BFF_BASE_URL: ${{ vars.NEXT_PUBLIC_MGE_BFF_BASE_URL }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
      NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Ensure Pages project exists
        run: npx wrangler pages project create "$PROJECT_NAME" --production-branch main || true

      - name: Configure MGE Pages Function secret
        run: printf "%s" "$MGEVERYDAY_API_TOKEN" | npx wrangler pages secret put MGEVERYDAY_API_TOKEN --project-name="$PROJECT_NAME"

      - name: Configure Stripe secret key
        if: ${{ env.STRIPE_SECRET_KEY != '' }}
        run: printf "%s" "$STRIPE_SECRET_KEY" | npx wrangler pages secret put STRIPE_SECRET_KEY --project-name="$PROJECT_NAME"

      - name: Configure Stripe webhook secret
        if: ${{ env.STRIPE_WEBHOOK_SECRET != '' }}
        run: printf "%s" "$STRIPE_WEBHOOK_SECRET" | npx wrangler pages secret put STRIPE_WEBHOOK_SECRET --project-name="$PROJECT_NAME"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy "$BUILD_DIR" --project-name="$PROJECT_NAME" --branch=main